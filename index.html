<!DOCTYPE html>
<html lang="en" data-theme="classic">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Schedule - Spider-Man Edition</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Comic Backdrop Elements -->
    <div class="comic-bg" aria-hidden="true">
        <div class="halftone-dots"></div>
        <div class="cityscape"></div>
        <div class="spider-man top-left"></div>
        <div class="spider-man bottom-right"></div>
    </div>

    <!-- Main App Container -->
    <main class="container">
        <header>
            <div class="title-banner" role="banner">
                <h1>TIME TABLE</h1>
            </div>
            
            <!-- Controls Toolbar -->
            <div class="header-controls">
                <button id="theme-toggle" class="theme-toggle comic-button" aria-label="Toggle Spider-Man Suit Theme">
                    <span class="theme-text">SUIT UP</span>
                    <span class="theme-icon">🕸️</span>
                </button>
                <button id="install-btn" class="install-btn comic-button" hidden aria-label="Install Timetable App">
                    Install App
                </button>
                <button id="download-btn" class="download-btn comic-button" aria-label="Save timetable grid as PNG image">
                    Save Image
                </button>
            </div>
            
            <!-- Dynamic break alerts badge -->
            <div id="break-badge-container" class="break-badge-container"></div>
        </header>

        <!-- Comic Sound Effect Stickers (Visual Interest) -->
        <div class="comic-action thip-1" aria-hidden="true">THIP!</div>
        <div class="comic-action whoosh" aria-hidden="true">WHOOSH!</div>
        <div class="comic-action thip-2" aria-hidden="true">THIP!</div>

        <!-- 2D Timetable Grid Wrapper (Shown on Desktop/Tablet: width >= 768px) -->
        <section class="table-wrapper" id="desktop-grid-section" aria-label="Timetable Grid View">
            <table id="timetable-grid">
                <!-- Dynamically generated table content -->
            </table>
        </section>

        <!-- Responsive Mobile Timeline Wrapper (Shown on Mobile: width < 768px) -->
        <section class="mobile-timeline-wrapper" id="mobile-timeline-section" aria-label="Timetable Daily Timeline View">
            <div class="day-selector" role="tablist" aria-label="Day Navigation">
                <button class="day-tab active" data-day="Monday" role="tab" aria-selected="true" id="tab-mon" aria-controls="panel-mon">MON</button>
                <button class="day-tab" data-day="Tuesday" role="tab" aria-selected="false" id="tab-tue" aria-controls="panel-tue">TUE</button>
                <button class="day-tab" data-day="Wednesday" role="tab" aria-selected="false" id="tab-wed" aria-controls="panel-wed">WED</button>
                <button class="day-tab" data-day="Thursday" role="tab" aria-selected="false" id="tab-thu" aria-controls="panel-thu">THU</button>
                <button class="day-tab" data-day="Friday" role="tab" aria-selected="false" id="tab-fri" aria-controls="panel-fri">FRI</button>
            </div>
            
            <div class="timeline" id="mobile-timeline" role="tabpanel" id="panel-day" aria-labelledby="tab-day">
                <!-- Dynamically generated timeline list -->
            </div>
        </section>

        <footer class="creator-footer">
            Created by Radhiv Kansara
        </footer>
    </main>

    <!-- Break Time Celebration Overlay -->
    <div id="break-overlay" class="break-overlay" role="dialog" aria-modal="true" aria-labelledby="break-modal-title">
        <canvas id="break-canvas" aria-hidden="true"></canvas>
        <div class="break-modal">
            <div class="break-badge kapow" aria-hidden="true">KAPOW!</div>
            <div class="break-badge zap" aria-hidden="true">BOOM!</div>
            
            <div class="break-title-container">
                <h2 id="break-modal-title" class="break-title">BREAK TIME!</h2>
            </div>
            
            <div class="break-subtitle">⚡ Citizen, Enjoy Your Rest! ⚡</div>
            
            <div class="break-activity-card">
                <div class="break-activity-label">Superhero Mission:</div>
                <div id="break-activity-text" class="break-activity-text">
                    Loading your break activity suggestion...
                </div>
            </div>
            
            <div class="break-buttons-container">
                <button id="break-reload-btn" class="break-btn break-btn-reload" aria-label="Get a new activity idea">New Mission ⚡</button>
                <button id="break-close-btn" class="break-btn break-btn-close" aria-label="Close break panel and return to class schedule">Back to Duty</button>
            </div>
        </div>
    </div>

    <!-- JavaScript logic -->
    <script>
        // Timetable Data Structure
        const DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
        
        const TIME_SLOTS = [
            { id: 1, start: "9:05", end: "9:55" },
            { id: 2, start: "10:00", end: "10:50" },
            { id: 3, start: "10:55", end: "11:45" },
            { id: 4, start: "11:50", end: "12:40" },
            { id: "lunch", label: "Lunch Break", isBreak: true },
            { id: 5, start: "1:25", end: "2:15" },
            { id: 6, start: "2:20", end: "3:10" },
            { id: 7, start: "3:15", end: "4:05" },
            { id: 8, start: "4:10", end: "5:00" }
        ];

        const SCHEDULE = {
            "Monday": {
                1: { subject: "Cyber Security", type: "blue" },
                2: { subject: "Programming with Python", type: "blue" },
                3: { subject: "Web Development", type: "blue" },
                4: { subject: "Software Engineering", type: "red" },
                5: { 
                    isSplit: true, 
                    rowspan: 2, 
                    type: "yellow",
                    labs: [
                        { batch: "1A08", sub: "SE", room: "D303A" },
                        { batch: "1B08", sub: "PP", room: "D203E" },
                        { batch: "1C08", sub: "DAA", room: "D303E" },
                        { batch: "1D08", sub: "WD", room: "A313" }
                    ] 
                },
                6: null,
                7: { subject: "Design and Analysis of Algorithms", type: "red" },
                8: { subject: "Open Elective", type: "white" }
            },
            "Tuesday": {
                1: { subject: "Software Engineering", type: "red" },
                2: { subject: "Design and Analysis of Algorithms", type: "red" },
                3: {
                    isSplit: true,
                    rowspan: 2,
                    type: "yellow",
                    labs: [
                        { batch: "1A08", sub: "PP", room: "D303B" },
                        { batch: "1B08", sub: "DAA", room: "D303E" },
                        { batch: "1C08", sub: "WD", room: "A125" },
                        { batch: "1D08", sub: "SE", room: "D303A" }
                    ]
                },
                4: null,
                5: {
                    isSplit: true,
                    rowspan: 2,
                    type: "yellow",
                    labs: [
                        { batch: "1A08", sub: "DAA", room: "D303E" },
                        { batch: "1B08", sub: "WD", room: "A313" },
                        { batch: "1C08", sub: "SE", room: "D303A" },
                        { batch: "1D08", sub: "PP", room: "D203E" }
                    ]
                },
                6: null,
                7: { subject: "Cyber Security", room: "A323", type: "blue" },
                8: { subject: "Minor Degree", type: "white" }
            },
            "Wednesday": {
                1: { subject: "", type: "white" },
                2: { subject: "Software Engineering", type: "red" },
                3: { subject: "Design and Analysis of Algorithms", type: "red" },
                4: { subject: "", type: "white" },
                5: {
                    isSplit: true,
                    rowspan: 2,
                    type: "yellow",
                    labs: [
                        { batch: "1B08", sub: "CYBER", room: "D203E" },
                        { batch: "1B08", sub: "AI", room: "D203B" },
                        { batch: "1A08", sub: "AI", room: "D203A" }
                    ]
                },
                6: null,
                7: { subject: "Artificial Intelligence", type: "blue" },
                8: { subject: "Open Elective", type: "white" }
            },
            "Thursday": {
                1: { subject: "", type: "white" },
                2: { subject: "Programming with Python", type: "blue" },
                3: { subject: "Web Development", type: "blue" },
                4: { subject: "Artificial Intelligence", type: "blue" },
                5: {
                    isSplit: true,
                    rowspan: 2,
                    type: "yellow",
                    labs: [
                        { batch: "1A08", sub: "CYBER", room: "D203E" },
                        { batch: "1C08", sub: "AI", room: "D203A" }
                    ]
                },
                6: null,
                7: { subject: "Artificial Intelligence", type: "blue" },
                8: { subject: "Minor Degree", type: "white" }
            },
            "Friday": {
                1: { subject: "Programming with Python", type: "blue" },
                2: { subject: "Design and Analysis of Algorithms", type: "red" },
                3: { subject: "Web Development", type: "blue" },
                4: { subject: "Cyber Security", type: "red" },
                5: {
                    isSplit: true,
                    rowspan: 2,
                    type: "yellow",
                    labs: [
                        { batch: "1A08", sub: "WD", room: "A313" },
                        { batch: "1B08", sub: "SE", room: "D303A" },
                        { batch: "1C08", sub: "PP", room: "D203E" },
                        { batch: "1D08", sub: "DAA", room: "D303E" }
                    ]
                },
                6: null,
                7: {
                    isCustomFridaySplit: true,
                    rowspan: 2,
                    type: "white",
                    customHtml: `
                        <table class="nested-table">
                            <tr>
                                <td rowspan="2" class="bg-white">Open Elective</td>
                                <td class="bg-white"></td>
                            </tr>
                            <tr>
                                <td class="bg-yellow">OE Lab</td>
                            </tr>
                        </table>
                    `,
                    labs: [
                        { batch: "All Batches", sub: "Open Elective", room: "N/A" },
                        { batch: "OE Lab Group", sub: "OE Lab", room: "N/A" }
                    ]
                },
                8: null
            }
        };

        // Service Worker registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(registration => {
                    console.log('SW registered:', registration);
                    
                    registration.addEventListener('updatefound', () => {
                        const newWorker = registration.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                console.log('New service worker version available.');
                            }
                        });
                    });
                }).catch(error => {
                    console.log('SW registration failed:', error);
                });

                let refreshing = false;
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (!refreshing) {
                        refreshing = true;
                        window.location.reload();
                    }
                });
            });
        }

        // PWA Install Helper
        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (installBtn) installBtn.hidden = false;
        });

        if (installBtn) {
            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') {
                        deferredPrompt = null;
                        installBtn.hidden = true;
                    }
                }
            });
        }

        window.addEventListener('appinstalled', () => {
            if (installBtn) installBtn.hidden = true;
            deferredPrompt = null;
        });

        // Theme Suite Switcher Logic
        function setupTheme() {
            const toggleBtn = document.getElementById('theme-toggle');
            if (!toggleBtn) return;

            const savedTheme = localStorage.getItem('timetable-theme') || 'classic';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeButtonUI(savedTheme);

            toggleBtn.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'classic' ? 'symbiote' : 'classic';
                
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('timetable-theme', newTheme);
                updateThemeButtonUI(newTheme);
            });
        }

        function updateThemeButtonUI(theme) {
            const textEl = document.querySelector('#theme-toggle .theme-text');
            const iconEl = document.querySelector('#theme-toggle .theme-icon');
            if (theme === 'classic') {
                if (textEl) textEl.textContent = 'SUIT UP (CLASSIC)';
                if (iconEl) iconEl.textContent = '🕸️';
            } else {
                if (textEl) textEl.textContent = 'SUIT UP (SYMBIOTE)';
                if (iconEl) iconEl.textContent = '🖤';
            }
        }

        // Render functions
        function renderTimetableGrid() {
            const table = document.getElementById('timetable-grid');
            if (!table) return;

            let theadHtml = `
                <thead>
                    <tr>
                        <th class="col-time">Time</th>
                        <th class="col-mon">Monday</th>
                        <th class="col-tue">Tuesday</th>
                        <th class="col-wed">Wednesday</th>
                        <th class="col-thu">Thursday</th>
                        <th class="col-fri">Friday</th>
                    </tr>
                </thead>
            `;

            let tbodyHtml = '<tbody>';
            const rowspanCounters = { "Monday": 0, "Tuesday": 0, "Wednesday": 0, "Thursday": 0, "Friday": 0 };

            TIME_SLOTS.forEach(slot => {
                if (slot.isBreak) {
                    tbodyHtml += `
                        <tr class="break-row">
                            <td colspan="6" class="break-text">${slot.label}</td>
                        </tr>
                    `;
                    return;
                }

                tbodyHtml += '<tr>';
                tbodyHtml += `<td class="time">${slot.start}-${slot.end}</td>`;

                DAYS.forEach(day => {
                    if (rowspanCounters[day] > 0) {
                        rowspanCounters[day]--;
                        return; 
                    }

                    const item = SCHEDULE[day][slot.id];
                    if (!item) {
                        tbodyHtml += '<td class="bg-white"></td>';
                        return;
                    }

                    const rowspanAttr = item.rowspan ? ` rowspan="${item.rowspan}"` : '';
                    if (item.rowspan) {
                        rowspanCounters[day] = item.rowspan - 1;
                    }

                    if (item.isSplit) {
                        const nestedCells = item.labs.map(lab => `
                            <td class="bg-${item.type}">
                                <div class="lab-cell-content">
                                    <div class="batch-num">${lab.batch}</div>
                                    <div class="subject-short">${lab.sub}</div>
                                    <div class="room-num">${lab.room || ''}</div>
                                </div>
                            </td>
                        `).join('');
                        
                        tbodyHtml += `
                            <td${rowspanAttr} class="split-cell bg-${item.type}">
                                <table class="nested-table">
                                    <tr>${nestedCells}</tr>
                                </table>
                            </td>
                        `;
                    } else if (item.isCustomFridaySplit) {
                        tbodyHtml += `
                            <td${rowspanAttr} class="split-cell">
                                ${item.customHtml}
                            </td>
                        `;
                    } else {
                        tbodyHtml += `
                            <td class="bg-${item.type}">
                                <div class="subject-name">${item.subject}</div>
                                ${item.room ? `<div class="room-num">${item.room}</div>` : ''}
                            </td>
                        `;
                    }
                });

                tbodyHtml += '</tr>';
            });

            tbodyHtml += '</tbody>';
            table.innerHTML = theadHtml + tbodyHtml;
        }

        // Selected day state for mobile
        let currentSelectedDay = DAYS[new Date().getDay() - 1] || "Monday";
        if (new Date().getDay() === 0 || new Date().getDay() === 6) {
            currentSelectedDay = "Monday"; // Weekend fallback
        }

        function renderMobileTimeline() {
            const timelineContainer = document.getElementById('mobile-timeline');
            if (!timelineContainer) return;

            const daySchedule = SCHEDULE[currentSelectedDay];
            let timelineHtml = '';

            const now = new Date();
            const currentMins = now.getHours() * 60 + now.getMinutes();

            TIME_SLOTS.forEach(slot => {
                if (slot.isBreak) {
                    timelineHtml += `
                        <div class="timeline-break-card" role="note">
                            <span class="break-icon">🥪</span>
                            <span class="break-text">${slot.label} (12:40 PM - 1:25 PM)</span>
                        </div>
                    `;
                    return;
                }

                // Check active slot timing boundaries
                const parseTime = (t) => {
                    let [h, m] = t.split(':').map(Number);
                    if (h < 6) h += 12; // Convert PM (e.g. 1:25 -> 13:25)
                    return h * 60 + m;
                };
                const startMins = parseTime(slot.start);
                const endMins = parseTime(slot.end);
                
                const isCurrentDaySelected = (now.getDay() - 1 === DAYS.indexOf(currentSelectedDay));
                const isActive = isCurrentDaySelected && (currentMins >= startMins && currentMins <= endMins);

                // Handle rowspanned items that start in a previous slot
                let item = daySchedule[slot.id];
                let isSpannedRef = false;
                
                if (item === null) {
                    for (let id = slot.id - 1; id >= 1; id--) {
                        const parentItem = daySchedule[id];
                        if (parentItem && parentItem.rowspan && (id + parentItem.rowspan > slot.id)) {
                            item = parentItem;
                            isSpannedRef = true;
                            break;
                        }
                    }
                }

                if (!item || (!item.subject && !item.isSplit && !item.isCustomFridaySplit)) {
                    timelineHtml += `
                        <div class="timeline-card empty ${isActive ? 'active' : ''}">
                            <div class="card-time">${slot.start} - ${slot.end}</div>
                            <div class="card-body">
                                <h3>Free Period</h3>
                                <p class="room-num">No scheduled classes</p>
                            </div>
                        </div>
                    `;
                    return;
                }

                const activeClass = isActive ? 'active' : '';
                const badgeHtml = isSpannedRef ? '<span class="status-badge continued">Continued</span>' : 
                                  (isActive ? '<span class="status-badge live">Live Now</span>' : '');

                let cardContentHtml = '';

                if (item.isSplit) {
                    cardContentHtml = `
                        <div class="card-content-header">
                            <h3>Practical Labs</h3>
                            ${badgeHtml}
                        </div>
                        <div class="lab-grid">
                            ${item.labs.map(lab => `
                                <div class="lab-badge bg-${item.type}">
                                    <span class="lab-batch">${lab.batch}</span>
                                    <span class="lab-subject">${lab.sub}</span>
                                    <span class="lab-room">📍 Room ${lab.room || 'N/A'}</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else if (item.isCustomFridaySplit) {
                    cardContentHtml = `
                        <div class="card-content-header">
                            <h3>Electives / Lab Split</h3>
                            ${badgeHtml}
                        </div>
                        <div class="lab-grid">
                            ${item.labs.map(lab => `
                                <div class="lab-badge bg-white">
                                    <span class="lab-batch">${lab.batch}</span>
                                    <span class="lab-subject">${lab.sub}</span>
                                    <span class="lab-room">📍 N/A</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else {
                    cardContentHtml = `
                        <div class="card-content-header">
                            <h3>${item.subject}</h3>
                            ${badgeHtml}
                        </div>
                        ${item.room ? `<p class="room-num">📍 Room: ${item.room}</p>` : ''}
                    `;
                }

                timelineHtml += `
                    <div class="timeline-card bg-${item.type} ${activeClass}" tabindex="0">
                        <div class="card-time">${slot.start} - ${slot.end}</div>
                        <div class="card-body">
                            ${cardContentHtml}
                        </div>
                    </div>
                `;
            });

            timelineContainer.innerHTML = timelineHtml;
            
            // Set ARIA landmark accessibility labels
            const panel = document.getElementById('panel-day');
            if (panel) {
                panel.setAttribute('aria-labelledby', `tab-${currentSelectedDay.toLowerCase().substring(0,3)}`);
            }
        }

        function setupDaySelector() {
            const tabs = document.querySelectorAll('.day-tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => {
                        t.classList.remove('active');
                        t.setAttribute('aria-selected', 'false');
                    });
                    tab.classList.add('active');
                    tab.setAttribute('aria-selected', 'true');
                    currentSelectedDay = tab.getAttribute('data-day');
                    renderMobileTimeline();
                });
                
                // Allow keyboard arrow keys traversal
                tab.addEventListener('keydown', (e) => {
                    let targetTab = null;
                    if (e.key === 'ArrowRight' || e.key === 'Right') {
                        targetTab = tab.nextElementSibling || tabs[0];
                    } else if (e.key === 'ArrowLeft' || e.key === 'Left') {
                        targetTab = tab.previousElementSibling || tabs[tabs.length - 1];
                    }
                    if (targetTab) {
                        targetTab.focus();
                        targetTab.click();
                        e.preventDefault();
                    }
                });
            });
        }

        function setInitialDayTab() {
            const tabs = document.querySelectorAll('.day-tab');
            tabs.forEach(tab => {
                if (tab.getAttribute('data-day') === currentSelectedDay) {
                    tab.classList.add('active');
                    tab.setAttribute('aria-selected', 'true');
                } else {
                    tab.classList.remove('active');
                    tab.setAttribute('aria-selected', 'false');
                }
            });
        }

        // Highlight active classes on 2D table grid (Desktop/Tablet)
        function highlightCurrent() {
            document.querySelectorAll('.highlight-day').forEach(el => el.classList.remove('highlight-day'));
            document.querySelectorAll('.highlight-lecture').forEach(el => el.classList.remove('highlight-lecture'));

            const now = new Date();
            const currentDay = now.getDay(); // 1=Mon, 5=Fri
            const currentMins = now.getHours() * 60 + now.getMinutes();

            // Highlight the day column header
            if (currentDay >= 1 && currentDay <= 5) {
                const headers = document.querySelectorAll('thead th');
                if (headers[currentDay]) headers[currentDay].classList.add('highlight-day');
            }

            // Build rowspan-aware matrix matching tr layout
            const matrix = [];
            const trs = document.querySelectorAll('tbody tr');

            trs.forEach((tr, rIdx) => {
                matrix[rIdx] = matrix[rIdx] || [];
                let cIdx = 0;
                Array.from(tr.children).forEach(td => {
                    while (matrix[rIdx][cIdx]) cIdx++;

                    const rowspan = parseInt(td.getAttribute('rowspan') || 1);
                    const colspan = parseInt(td.getAttribute('colspan') || 1);

                    for (let r = 0; r < rowspan; r++) {
                        for (let c = 0; c < colspan; c++) {
                            matrix[rIdx + r] = matrix[rIdx + r] || [];
                            matrix[rIdx + r][cIdx + c] = td;
                        }
                    }
                });
            });

            // Find correct time cell to highlight
            trs.forEach((tr, rIdx) => {
                if (tr.classList.contains('break-row')) return;
                const timeCell = tr.querySelector('.time');
                if (!timeCell) return;

                const timeText = timeCell.innerText;
                const [startStr, endStr] = timeText.split('-');

                const parseTime = (t) => {
                    let [h, m] = t.split(':').map(Number);
                    if (h < 6) h += 12; // Convert PM
                    return h * 60 + m;
                };

                const startMins = parseTime(startStr);
                const endMins = parseTime(endStr);

                if (currentMins >= startMins && currentMins <= endMins) {
                    timeCell.classList.add('highlight-day');

                    if (currentDay >= 1 && currentDay <= 5) {
                        const activeCell = matrix[rIdx][currentDay];
                        if (activeCell && activeCell !== timeCell && activeCell.innerText.trim() !== '') {
                            activeCell.classList.add('highlight-lecture');
                        }
                    }
                }
            });
            
            // Re-render mobile timeline view to refresh its status highlights
            renderMobileTimeline();
        }

        // Save layout canvas export
        const downloadBtn = document.getElementById('download-btn');
        if (downloadBtn) {
            downloadBtn.addEventListener('click', () => {
                const tableWrapper = document.querySelector('.table-wrapper');
                
                // Backup values
                const originalDisplay = tableWrapper.style.display;
                const originalPosition = tableWrapper.style.position;
                const originalLeft = tableWrapper.style.left;
                
                // If viewing on mobile, temporarily show grid layout off-screen for canvas rendering
                const isMobile = window.innerWidth < 768;
                if (isMobile) {
                    tableWrapper.style.display = 'block';
                    tableWrapper.style.position = 'absolute';
                    tableWrapper.style.left = '-9999px';
                }
                
                const originalOverflow = tableWrapper.style.overflowX;
                tableWrapper.style.overflowX = 'visible';

                html2canvas(tableWrapper, {
                    scale: 2.5, // High resolution crisp export
                    backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--card-bg-white').trim() || '#ffffff',
                    windowWidth: 1200, // Grid width anchor
                    width: 1200
                }).then(canvas => {
                    // Restore layouts
                    tableWrapper.style.overflowX = originalOverflow;
                    if (isMobile) {
                        tableWrapper.style.display = originalDisplay;
                        tableWrapper.style.position = originalPosition;
                        tableWrapper.style.left = originalLeft;
                    }

                    const link = document.createElement('a');
                    link.download = 'timetable-spiderman.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                });
            });
        }

        // --- Break Time Celebration System ---
        const breakOverlay = document.getElementById('break-overlay');
        const breakCanvas = document.getElementById('break-canvas');
        const breakCtx = breakCanvas ? breakCanvas.getContext('2d') : null;
        const breakActivityText = document.getElementById('break-activity-text');
        const breakReloadBtn = document.getElementById('break-reload-btn');
        const breakCloseBtn = document.getElementById('break-close-btn');

        let particles = [];
        let animationFrameId = null;
        let isAnimationRunning = false;

        const breakActivities = [
            "🕷️ Web-shooter Calibration: Do 5 quick arm stretch web-shoots. Pew! Pew!",
            "🔋 Stark Core Recharge: Drink a full glass of water. Hydration is a superpower!",
            "👀 Spider-Sense Calibration: Close your eyes and focus on 3 distant sounds. Rest those eyes, citizen!",
            "🦸 Hero Pose: Stand up, put your hands on your hips, and take 3 deep superhero breaths.",
            "🍎 Super-Soldier Fuel: Grab a healthy snack. A hero needs calories to save the day!",
            "💃 Wakandan Dance-Off: Stand up and shake out your limbs for 20 seconds. Shake off the fatigue!",
            "🧱 Sorcerer Meditation: Do absolutely nothing for 60 seconds. Empty your mind like a master magician.",
            "🚀 Cosmic Stretch: Reach your hands as high as possible to the stars, then touch your toes!",
            "🦸 Stretch of Justice: Stretch your neck and roll your shoulders. Combat fatigue like Captain America!"
        ];

        const comicColors = ['#e64a40', '#f1c40f', '#2ecc71', '#3498db', '#9b59b6', '#e67e22', '#ffeb3b', '#e74c3c'];
        const comicWords = ["POW!", "BAM!", "POP!", "ZAP!", "BOOM!", "WOW!", "YAY!", "BREAK!", "HERO!", "WHOOSH!"];

        class NormalParticle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 4 + 2;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.gravity = 0.12;
                this.friction = 0.96;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.01;
            }

            update() {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class WordParticle {
            constructor(x, y, word, color) {
                this.x = x;
                this.y = y;
                this.word = word;
                this.color = color;
                this.fontSize = Math.floor(Math.random() * 6) + 14; 
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 3 + 1;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed - 1.5;
                this.rotation = Math.random() * 0.4 - 0.2;
                this.alpha = 1;
                this.decay = 0.015;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.06;
                this.alpha -= this.decay;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.font = `bold ${this.fontSize}px 'Bangers', cursive`;
                ctx.fillStyle = this.color;
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 3;
                ctx.strokeText(this.word, 0, 0);
                ctx.fillText(this.word, 0, 0);
                ctx.restore();
            }
        }

        function resizeCanvas() {
            if (breakCanvas) {
                breakCanvas.width = window.innerWidth;
                breakCanvas.height = window.innerHeight;
            }
        }

        function createExplosion(x, y) {
            if (!breakCtx) return;
            
            const count = Math.floor(Math.random() * 15) + 30;
            for (let i = 0; i < count; i++) {
                const color = comicColors[Math.floor(Math.random() * comicColors.length)];
                particles.push(new NormalParticle(x, y, color));
            }
            
            const wordCount = Math.floor(Math.random() * 2) + 1;
            for (let i = 0; i < wordCount; i++) {
                const word = comicWords[Math.floor(Math.random() * comicWords.length)];
                const color = comicColors[Math.floor(Math.random() * comicColors.length)];
                particles.push(new WordParticle(x, y, word, color));
            }

            // Start loop ONLY if it is not already running
            if (!animationFrameId) {
                animationFrameId = requestAnimationFrame(updateParticles);
            }
        }

        function updateParticles() {
            if (!breakCtx) return;
            breakCtx.clearRect(0, 0, breakCanvas.width, breakCanvas.height);
            
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                } else {
                    p.draw(breakCtx);
                }
            }

            // Performance: break animation loops when particles are depleted
            if (particles.length > 0) {
                animationFrameId = requestAnimationFrame(updateParticles);
            } else {
                animationFrameId = null;
            }
        }

        function startAnimation() {
            if (!isAnimationRunning) {
                isAnimationRunning = true;
                resizeCanvas();
                particles = [];
                triggerAutoFireworks();
            }
        }

        function stopAnimation() {
            isAnimationRunning = false;
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            if (breakCtx) breakCtx.clearRect(0, 0, breakCanvas.width, breakCanvas.height);
            particles = [];
        }

        function triggerAutoFireworks() {
            if (!isAnimationRunning) return;
            const w = window.innerWidth;
            const h = window.innerHeight;
            const burstCount = Math.floor(Math.random() * 3) + 3;
            for (let i = 0; i < burstCount; i++) {
                setTimeout(() => {
                    if (isAnimationRunning) {
                        const randomX = Math.random() * (w * 0.6) + (w * 0.2);
                        const randomY = Math.random() * (h * 0.4) + (h * 0.2);
                        createExplosion(randomX, randomY);
                    }
                }, i * 350);
            }
        }

        function setRandomActivity() {
            if (!breakActivityText) return;
            const current = breakActivityText.innerText;
            let available = breakActivities.filter(act => act !== current);
            if (available.length === 0) available = breakActivities;
            breakActivityText.innerText = available[Math.floor(Math.random() * available.length)];
        }

        function showBreakPopup() {
            setRandomActivity();
            if (breakOverlay) {
                breakOverlay.style.display = 'flex';
                breakOverlay.offsetWidth; // Reflow
                breakOverlay.classList.add('active');
                
                // Focus container for keyboard modal lock
                breakOverlay.focus();
            }
            startAnimation();
        }

        function isBreakActive() {
            const now = new Date();
            const day = now.getDay();
            if (day < 1 || day > 5) return false;

            const currentMins = now.getHours() * 60 + now.getMinutes();
            const startMins = 12 * 60 + 40; 
            const endMins = 13 * 60 + 25;   
            return currentMins >= startMins && currentMins < endMins;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const isTestMode = urlParams.has('test') && urlParams.get('test') === 'break';

        function checkAndOpenBreak() {
            updateBreakAlertBadge();
            const hasShownThisSession = sessionStorage.getItem('breakPopupShown') === 'true';
            
            if (isTestMode) {
                showBreakPopup();
            } else if (isBreakActive() && !hasShownThisSession) {
                showBreakPopup();
                sessionStorage.setItem('breakPopupShown', 'true');
            }
        }

        function updateBreakAlertBadge() {
            const container = document.getElementById('break-badge-container');
            if (!container) return;

            if (isBreakActive() || isTestMode) {
                if (!document.getElementById('trigger-break-btn')) {
                    const btn = document.createElement('button');
                    btn.id = 'trigger-break-btn';
                    btn.className = 'break-alert-indicator';
                    btn.innerHTML = '💥 BREAKING NEWS: IT\'S BREAK TIME! 🎉';
                    btn.addEventListener('click', () => {
                        showBreakPopup();
                    });
                    container.appendChild(btn);
                }
            } else {
                container.innerHTML = '';
            }
        }

        function closeBreakPopup() {
            if (breakOverlay) {
                breakOverlay.classList.remove('active');
                setTimeout(() => {
                    breakOverlay.style.display = 'none';
                    stopAnimation();
                }, 400); 
            }
        }

        // Event Listeners
        window.addEventListener('resize', resizeCanvas);
        
        if (breakCanvas) {
            breakCanvas.addEventListener('click', (e) => {
                createExplosion(e.clientX, e.clientY);
            });

            breakCanvas.addEventListener('touchstart', (e) => {
                if (e.touches && e.touches.length > 0) {
                    createExplosion(e.touches[0].clientX, e.touches[0].clientY);
                }
            });
        }

        if (breakReloadBtn) {
            breakReloadBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                setRandomActivity();
                const rect = breakReloadBtn.getBoundingClientRect();
                createExplosion(rect.left + rect.width / 2, rect.top + rect.height / 2);
            });
        }

        if (breakCloseBtn) {
            breakCloseBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                closeBreakPopup();
            });
        }

        // Accessibility Modal Lock: Allow escape key closing for the break popup
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && breakOverlay && breakOverlay.classList.contains('active')) {
                closeBreakPopup();
            }
        });

        // Initialize Dynamic Pages on Load
        document.addEventListener('DOMContentLoaded', () => {
            renderTimetableGrid();
            setInitialDayTab();
            renderMobileTimeline();
            setupDaySelector();
            setupTheme();
            highlightCurrent();
            checkAndOpenBreak();
            
            // Periodical loops
            setInterval(highlightCurrent, 60000);
            setInterval(checkAndOpenBreak, 60000);
        });
    </script>
    
    <!-- Load local offline-capable html2canvas library -->
    <script src="html2canvas.min.js"></script>
</body>

</html>
