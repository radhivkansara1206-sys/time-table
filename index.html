<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Schedule</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Main App Container -->
    <main class="container">
        <header class="app-header">
            <div class="logo-container">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logo-icon"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                <h1>Timetable</h1>
                <span class="badge">Tech Edition</span>
            </div>
            
            <!-- Controls Toolbar -->
            <div class="header-controls">
                <button id="install-btn" class="tech-button secondary" hidden aria-label="Install App">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Install
                </button>
                <button id="download-btn" class="tech-button secondary" aria-label="Export Image">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                    Export
                </button>
            </div>
            
            <!-- Dynamic break alerts badge -->
            <div id="break-badge-container" class="break-badge-container"></div>
        </header>

        <!-- Desktop Grid Wrapper (Hidden on mobile) -->
        <section class="table-wrapper" id="desktop-grid-section" aria-label="Timetable Grid View">
            <table id="timetable-grid">
                <!-- Dynamically generated table content -->
            </table>
        </section>

        <!-- Mobile Agenda Wrapper (Hidden on desktop) -->
        <section class="mobile-agenda-wrapper" id="mobile-agenda-section" aria-label="Daily Agenda View">
            <div class="segmented-control" role="tablist" aria-label="Day Navigation">
                <button class="segment-tab active" data-day="Monday" role="tab" aria-selected="true" id="tab-mon" aria-controls="panel-mon">Mon</button>
                <button class="segment-tab" data-day="Tuesday" role="tab" aria-selected="false" id="tab-tue" aria-controls="panel-tue">Tue</button>
                <button class="segment-tab" data-day="Wednesday" role="tab" aria-selected="false" id="tab-wed" aria-controls="panel-wed">Wed</button>
                <button class="segment-tab" data-day="Thursday" role="tab" aria-selected="false" id="tab-thu" aria-controls="panel-thu">Thu</button>
                <button class="segment-tab" data-day="Friday" role="tab" aria-selected="false" id="tab-fri" aria-controls="panel-fri">Fri</button>
            </div>
            
            <div class="agenda-timeline" id="mobile-timeline" role="tabpanel" id="panel-day" aria-labelledby="tab-day">
                <!-- Dynamically generated timeline list -->
            </div>
        </section>
    </main>

    <!-- Break Time Sleek Modal -->
    <div id="break-overlay" class="tech-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="break-modal-title" tabindex="-1">
        <canvas id="break-canvas" aria-hidden="true"></canvas>
        <div class="tech-modal">
            <div class="modal-header">
                <div class="header-left">
                    <div class="pulse-indicator"></div>
                    <h2 id="break-modal-title" class="modal-title">System Break</h2>
                </div>
                <div id="break-current-time" class="time-value">12:00 PM</div>
            </div>

            <!-- Countdown Timer -->
            <div class="modal-body">
                <div class="countdown-container">
                    <div id="break-countdown-timer" class="countdown-value">45:00</div>
                    <div class="countdown-label">MINUTES REMAINING</div>
                </div>

                <!-- Progress Bar -->
                <div class="tech-progress-container" aria-label="Break progress">
                    <div class="tech-progress-track">
                        <div id="break-progress-bar" class="tech-progress-bar"></div>
                    </div>
                </div>

                <!-- Next Lecture Info Card -->
                <div class="info-card">
                    <div class="info-label">NEXT LECTURE (1:25 PM)</div>
                    <div id="break-next-lecture-subject" class="info-primary">Loading...</div>
                    <div id="break-next-lecture-room" class="info-secondary">...</div>
                </div>

                <!-- Motivational Quote Card -->
                <div class="quote-card">
                    <p id="break-quote-text" class="quote-text">"With great power comes great responsibility."</p>
                    <p class="quote-author">— Peter Parker</p>
                </div>
            </div>
            
            <!-- Controls Buttons -->
            <div class="modal-footer">
                <button id="break-reload-btn" class="tech-button secondary outline" aria-label="Get another quote">Next Quote</button>
                <button id="break-resume-btn" class="tech-button primary" aria-label="Resume schedule view">Resume Session</button>
            </div>
        </div>
    </div>

    <!-- JavaScript logic -->
    <script>
        // Timetable Data Structure
        const DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
        
        const TIME_SLOTS = [

                4: { subject: "", type: "white" },
                5: {
                    isSplit: true,

                    labs: [
                        { batch: "1B08", sub: "CYBER", room: "D203E" },
                        { batch: "1B08", sub: "AI", room: "D203B" },
                        { batch: "1A08", sub: "AI", room: "D203A" }
                    ]
                },
                6: null,
                7: { subject: "Artificial Intelligence", type: "blue" },
                8: { subject: "Open Elective", type: "white" }
            },
            "Thursday": {
                1: { subject: "", type: "white" },
                2: { subject: "Programming with Python", type: "blue" },
                3: { subject: "Web Development", type: "blue" },
                4: { subject: "Artificial Intelligence", type: "blue" },
                5: {
                    isSplit: true,

                    type: "yellow",
                    labs: [

                    ]
                },

            },

                },

                    customHtml: `

        };

        const SPIDER_QUOTES = [
            { text: "With great power comes great responsibility.", author: "Uncle Ben" },
            { text: "Anyone can wear the mask. You can wear the mask!", author: "Miles Morales" },
            { text: "It's a leap of faith. That's all it is, Miles. A leap of faith.", author: "Peter B. Parker" },
            { text: "Sometimes to do what's right, we have to be steady and give up the things we want the most.", author: "Peter Parker" },
            { text: "No matter how many hits I take, I always find a way to come back.", author: "Peter Parker" },
            { text: "My Spider-Sense is tingling! The next lecture is about to start.", author: "Classic Spidey" },
            { text: "I love you guys. You are friendly neighborhood timetables.", author: "Spidey-3" },
            { text: "We are all Spider-Man. And we are counting on you.", author: "Mary Jane" }
        ];

        // Service Worker registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(registration => {
                    console.log('SW registered');
                    
                    registration.addEventListener('updatefound', () => {
                        const newWorker = registration.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                console.log('New service worker version available.');
                            }
                        });
                    });
                }).catch(error => {
                    console.log('SW registration failed:', error);
                });

                let refreshing = false;
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (!refreshing) {
                        refreshing = true;
                        window.location.reload();
                    }
                });
            });
        }

        // PWA Install Helper
        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (installBtn) installBtn.hidden = false;
        });

        if (installBtn) {
            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') {
                        deferredPrompt = null;
                        installBtn.hidden = true;
                    }
                }
            });
        }

        window.addEventListener('appinstalled', () => {
            if (installBtn) installBtn.hidden = true;
            deferredPrompt = null;
        });

        // Render dynamic desktop grid timetable
        function renderTimetableGrid() {
            const table = document.getElementById('timetable-grid');
            if (!table) return;

            let theadHtml = `
                <thead>
                    <tr>
                        <th class="col-time">Time</th>
                        <th class="col-mon">Monday</th>
                        <th class="col-tue">Tuesday</th>
                        <th class="col-wed">Wednesday</th>
                        <th class="col-thu">Thursday</th>
                        <th class="col-fri">Friday</th>
                    </tr>
                </thead>
            `;

            let tbodyHtml = '<tbody>';
            const rowspanCounters = { "Monday": 0, "Tuesday": 0, "Wednesday": 0, "Thursday": 0, "Friday": 0 };

            TIME_SLOTS.forEach(slot => {
                if (slot.isBreak) {
                    tbodyHtml += `
                        <tr class="break-row">
                            <td colspan="6" class="break-text">${slot.label}</td>
                        </tr>
                    `;
                    return;
                }

                tbodyHtml += '<tr>';
                tbodyHtml += `<td class="time" scope="row">${slot.start}-${slot.end}</td>`;

                DAYS.forEach(day => {
                    if (rowspanCounters[day] > 0) {
                        rowspanCounters[day]--;
                        return; 
                    }

                    const item = SCHEDULE[day][slot.id];
                    if (!item) {
                        tbodyHtml += '<td class="bg-white"></td>';
                        return;
                    }

                    const rowspanAttr = item.rowspan ? ` rowspan="${item.rowspan}"` : '';
                    if (item.rowspan) {
                        rowspanCounters[day] = item.rowspan - 1;
                    }

                    if (item.isSplit) {
                        const nestedCells = item.labs.map(lab => `
                            <td class="bg-${item.type}">
                                <div class="lab-cell-content">
                                    <div class="batch-num">${lab.batch}</div>
                                    <div class="subject-short">${lab.sub}</div>
                                    <div class="room-num">${lab.room || ''}</div>
                                </div>
                            </td>
                        `).join('');
                        
                        tbodyHtml += `
                            <td${rowspanAttr} class="split-cell bg-${item.type}">
                                <table class="nested-table">
                                    <tr>${nestedCells}</tr>
                                </table>
                            </td>
                        `;
                    } else if (item.isCustomFridaySplit) {
                        tbodyHtml += `
                            <td${rowspanAttr} class="split-cell">
                                ${item.customHtml}
                            </td>
                        `;
                    } else {
                        tbodyHtml += `
                            <td class="bg-${item.type}">
                                <div class="subject-name">${item.subject}</div>
                                ${item.room ? `<div class="room-num">${item.room}</div>` : ''}
                            </td>
                        `;
                    }
                });

                tbodyHtml += '</tr>';
            });

            tbodyHtml += '</tbody>';
            table.innerHTML = theadHtml + tbodyHtml;
        }

        // Render dynamic mobile vertical agenda timeline
        let currentSelectedDay = DAYS[new Date().getDay() - 1] || "Monday";
        if (new Date().getDay() === 0 || new Date().getDay() === 6) {
            currentSelectedDay = "Monday"; // Weekend fallback
        }

        function renderMobileTimeline() {
            const timelineContainer = document.getElementById('mobile-timeline');
            if (!timelineContainer) return;

            const daySchedule = SCHEDULE[currentSelectedDay];
            let timelineHtml = '';

            const now = new Date();
            const currentMins = now.getHours() * 60 + now.getMinutes();

            TIME_SLOTS.forEach(slot => {
                if (slot.isBreak) {
                    timelineHtml += `
                        <div class="timeline-break-card" role="note">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="break-icon"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                            <span class="break-text">${slot.label} (12:40 PM - 1:25 PM)</span>
                        </div>
                    `;
                    return;
                }

                const parseTime = (t) => {
                    let [h, m] = t.split(':').map(Number);
                    if (h < 6) h += 12; // Convert PM
                    return h * 60 + m;
                };
                const startMins = parseTime(slot.start);
                const endMins = parseTime(slot.end);
                
                const isCurrentDaySelected = (now.getDay() - 1 === DAYS.indexOf(currentSelectedDay));
                const isActive = isCurrentDaySelected && (currentMins >= startMins && currentMins <= endMins);

                let item = daySchedule[slot.id];
                let isSpannedRef = false;
                
                if (item === null) {
                    for (let id = slot.id - 1; id >= 1; id--) {
                        const parentItem = daySchedule[id];
                        if (parentItem && parentItem.rowspan && (id + parentItem.rowspan > slot.id)) {
                            item = parentItem;
                            isSpannedRef = true;
                            break;
                        }
                    }
                }

                if (!item || (!item.subject && !item.isSplit && !item.isCustomFridaySplit)) {
                    timelineHtml += `
                        <div class="timeline-card empty ${isActive ? 'active' : ''}">
                            <div class="card-time">${slot.start} - ${slot.end}</div>
                            <div class="card-body">
                                <h3>Free Period</h3>
                                <p class="room-num">No scheduled classes</p>
                            </div>
                        </div>
                    `;
                    return;
                }

                const activeClass = isActive ? 'active' : '';
                const badgeHtml = isSpannedRef ? '<span class="status-badge continued">Continued</span>' : 
                                  (isActive ? '<span class="status-badge live"><span class="pulse"></span> Live Now</span>' : '');

                let cardContentHtml = '';

                if (item.isSplit) {
                    cardContentHtml = `
                        <div class="card-content-header">
                            <h3>Practical Labs</h3>
                            ${badgeHtml}
                        </div>
                        <div class="lab-grid">
                            ${item.labs.map(lab => `
                                <div class="lab-badge type-${item.type}">
                                    <span class="lab-batch">${lab.batch}</span>
                                    <div class="lab-details">
                                        <span class="lab-subject">${lab.sub}</span>
                                        <span class="lab-room">Room ${lab.room || 'N/A'}</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else if (item.isCustomFridaySplit) {
                    cardContentHtml = `
                        <div class="card-content-header">
                            <h3>Electives / Lab Split</h3>
                            ${badgeHtml}
                        </div>
                        <div class="lab-grid">
                            ${item.labs.map(lab => `
                                <div class="lab-badge type-white">
                                    <span class="lab-batch">${lab.batch}</span>
                                    <div class="lab-details">
                                        <span class="lab-subject">${lab.sub}</span>
                                        <span class="lab-room">N/A</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else {
                    cardContentHtml = `
                        <div class="card-content-header">
                            <h3>${item.subject}</h3>
                            ${badgeHtml}
                        </div>
                        ${item.room ? `<p class="room-num">Room ${item.room}</p>` : ''}
                    `;
                }

                timelineHtml += `
                    <div class="timeline-card type-${item.type} ${activeClass}" tabindex="0">
                        <div class="card-time">${slot.start} - ${slot.end}</div>
                        <div class="card-body">
                            ${cardContentHtml}
                        </div>
                    </div>
                `;
            });

            timelineContainer.innerHTML = timelineHtml;
        }

        function setupDaySelector() {
            const tabs = document.querySelectorAll('.segment-tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => {
                        t.classList.remove('active');
                        t.setAttribute('aria-selected', 'false');
                    });
                    tab.classList.add('active');
                    tab.setAttribute('aria-selected', 'true');
                    currentSelectedDay = tab.getAttribute('data-day');
                    renderMobileTimeline();
                });
                
                // Allow keyboard arrow keys traversal
                tab.addEventListener('keydown', (e) => {
                    let targetTab = null;
                    if (e.key === 'ArrowRight' || e.key === 'Right') {
                        targetTab = tab.nextElementSibling || tabs[0];
                    } else if (e.key === 'ArrowLeft' || e.key === 'Left') {
                        targetTab = tab.previousElementSibling || tabs[tabs.length - 1];
                    }
                    if (targetTab) {
                        targetTab.focus();
                        targetTab.click();
                        e.preventDefault();
                    }
                });
            });
            
            // Set initial tab based on current selected day
            tabs.forEach(tab => {
                if (tab.getAttribute('data-day') === currentSelectedDay) {
                    tab.classList.add('active');
                    tab.setAttribute('aria-selected', 'true');
                } else {
                    tab.classList.remove('active');
                    tab.setAttribute('aria-selected', 'false');
                }
            });
        }

        // Highlight active classes on 2D table grid (Desktop/Tablet)
        function highlightCurrent() {
            document.querySelectorAll('.highlight-day').forEach(el => el.classList.remove('highlight-day'));
            document.querySelectorAll('.highlight-lecture').forEach(el => el.classList.remove('highlight-lecture'));

            const now = new Date();
            const currentDay = now.getDay(); // 1=Mon, 5=Fri
            const currentMins = now.getHours() * 60 + now.getMinutes();

            // Highlight the day column header
            if (currentDay >= 1 && currentDay <= 5) {
                const headers = document.querySelectorAll('thead th');
                if (headers[currentDay]) headers[currentDay].classList.add('highlight-day');
            }

            // Build rowspan-aware matrix matching tr layout
            const matrix = [];
            const trs = document.querySelectorAll('tbody tr');

            trs.forEach((tr, rIdx) => {
                matrix[rIdx] = matrix[rIdx] || [];
                let cIdx = 0;
                Array.from(tr.children).forEach(td => {
                    while (matrix[rIdx][cIdx]) cIdx++;

                    const rowspan = parseInt(td.getAttribute('rowspan') || 1);
                    const colspan = parseInt(td.getAttribute('colspan') || 1);

                    for (let r = 0; r < rowspan; r++) {
                        for (let c = 0; c < colspan; c++) {
                            matrix[rIdx + r] = matrix[rIdx + r] || [];
                            matrix[rIdx + r][cIdx + c] = td;
                        }
                    }
                });
            });

            // Find correct time cell to highlight
            trs.forEach((tr, rIdx) => {
                if (tr.classList.contains('break-row')) return;
                const timeCell = tr.querySelector('.time');
                if (!timeCell) return;

                const timeText = timeCell.innerText;
                const [startStr, endStr] = timeText.split('-');

                const parseTime = (t) => {
                    let [h, m] = t.split(':').map(Number);
                    if (h < 6) h += 12; // Convert PM
                    return h * 60 + m;
                };

                const startMins = parseTime(startStr);
                const endMins = parseTime(endStr);

                if (currentMins >= startMins && currentMins <= endMins) {
                    timeCell.classList.add('highlight-day');

                    if (currentDay >= 1 && currentDay <= 5) {
                        const activeCell = matrix[rIdx][currentDay];
                        if (activeCell && activeCell !== timeCell && activeCell.innerText.trim() !== '') {
                            activeCell.classList.add('highlight-lecture');
                        }
                    }
                }
            });
            
            // Re-render mobile timeline view to refresh its status highlights
            renderMobileTimeline();
        }

        // Save layout canvas export
        const downloadBtn = document.getElementById('download-btn');
        if (downloadBtn) {
            downloadBtn.addEventListener('click', () => {
                const isMobile = window.innerWidth < 768;
                let targetEl = document.querySelector('.table-wrapper');
                
                if (isMobile) {
                    // On mobile, temporarily display the table off-screen for rendering
                    targetEl.style.display = 'block';
                    targetEl.style.position = 'absolute';
                    targetEl.style.left = '-9999px';
                }
                
                const originalOverflow = targetEl.style.overflowX;
                targetEl.style.overflowX = 'visible';

                html2canvas(targetEl, {
                    scale: 2.5,
                    backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--bg-card').trim() || '#111111',
                    windowWidth: 1200,
                    width: 1200
                }).then(canvas => {
                    targetEl.style.overflowX = originalOverflow;
                    if (isMobile) {
                        targetEl.style.display = '';
                        targetEl.style.position = '';
                        targetEl.style.left = '';
                    }

                    const link = document.createElement('a');
                    link.download = 'timetable-export.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                });
            });
        }

        // --- Break Time Tech Modal System ---
        const breakOverlay = document.getElementById('break-overlay');
        const breakCanvas = document.getElementById('break-canvas');
        const breakCtx = breakCanvas ? breakCanvas.getContext('2d') : null;
        const breakReloadBtn = document.getElementById('break-reload-btn');
        const breakResumeBtn = document.getElementById('break-resume-btn');

        let particles = [];
        let animationFrameId = null;
        let isAnimationRunning = false;
        let breakIntervalId = null;
        let breakStartTime = null;
        let breakEndTime = null;

        // Clean, tech-style particles (soft glowing orbs)
        const techColors = ['#FF3366', '#00C3FF', '#8A2BE2', '#00E5FF', '#FFFFFF'];

        class TechParticle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 3 + 1;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 4 + 1;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.friction = 0.94;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.015;
            }

            update() {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function resizeCanvas() {
            if (breakCanvas) {
                breakCanvas.width = window.innerWidth;
                breakCanvas.height = window.innerHeight;
            }
        }

        function createTechBurst(x, y) {
            if (!breakCtx) return;
            const count = Math.floor(Math.random() * 20) + 20;
            for (let i = 0; i < count; i++) {
                const color = techColors[Math.floor(Math.random() * techColors.length)];
                particles.push(new TechParticle(x, y, color));
            }
            if (!animationFrameId) {
                animationFrameId = requestAnimationFrame(updateParticles);
            }
        }

        function updateParticles() {
            if (!breakCtx) return;
            breakCtx.clearRect(0, 0, breakCanvas.width, breakCanvas.height);
            
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                } else {
                    p.draw(breakCtx);
                }
            }

            if (particles.length > 0) {
                animationFrameId = requestAnimationFrame(updateParticles);
            } else {
                animationFrameId = null;
            }
        }

        function startAnimation() {
            if (!isAnimationRunning) {
                isAnimationRunning = true;
                resizeCanvas();
                particles = [];
                triggerAutoBurst();
            }
        }

        function stopAnimation() {
            isAnimationRunning = false;
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            if (breakCtx) breakCtx.clearRect(0, 0, breakCanvas.width, breakCanvas.height);
            particles = [];
        }

        function triggerAutoBurst() {
            if (!isAnimationRunning) return;
            const w = window.innerWidth;
            const h = window.innerHeight;
            setTimeout(() => {
                if (isAnimationRunning) {
                    createTechBurst(w / 2, h / 3);
                }
            }, 300);
        }

        function setRandomQuote() {
            const quoteTextEl = document.getElementById('break-quote-text');
            const quoteAuthorEl = document.querySelector('.quote-author');
            if (!quoteTextEl || !quoteAuthorEl) return;
            
            const rand = SPIDER_QUOTES[Math.floor(Math.random() * SPIDER_QUOTES.length)];
            quoteTextEl.innerText = `"${rand.text}"`;
            quoteAuthorEl.innerText = `— ${rand.author}`;
        }

        function updateNextLectureInfo() {
            const subjectEl = document.getElementById('break-next-lecture-subject');
            const roomEl = document.getElementById('break-next-lecture-room');
            if (!subjectEl || !roomEl) return;

            const now = new Date();
            const currentDay = DAYS[now.getDay() - 1] || "Monday";
            const nextSlot = SCHEDULE[currentDay][5]; // Slot 5 starts at 1:25 PM

            if (nextSlot) {
                if (nextSlot.isSplit) {
                    subjectEl.innerText = `Practical Labs`;
                    roomEl.innerText = nextSlot.labs.map(l => `${l.batch}: ${l.sub}`).join(' | ');
                } else {
                    subjectEl.innerText = nextSlot.subject || "Free Period";
                    roomEl.innerText = nextSlot.room ? `Room ${nextSlot.room}` : "No Room Assigned";
                }
            } else {
                subjectEl.innerText = "Free Period";
                roomEl.innerText = "Enjoy your break";
            }
        }

        // Accessibility Modal Focus Trap Helper
        function trapFocus(modalEl) {
            const focusableElements = modalEl.querySelectorAll('button, [tabindex="0"], a');
            if (focusableElements.length === 0) return;
            const firstFocusable = focusableElements[0];
            const lastFocusable = focusableElements[focusableElements.length - 1];

            modalEl.addEventListener('keydown', (e) => {
                if (e.key === 'Tab') {
                    if (e.shiftKey) {
                        if (document.activeElement === firstFocusable) {
                            lastFocusable.focus();
                            e.preventDefault();
                        }
                    } else {
                        if (document.activeElement === lastFocusable) {
                            firstFocusable.focus();
                            e.preventDefault();
                        }
                    }
                }
            });
        }

        function startBreakOverlayTicker() {
            setRandomQuote();
            updateNextLectureInfo();

            const now = new Date();
            if (isBreakActive()) {
                breakStartTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 12, 40, 0);
                breakEndTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 13, 25, 0);
            } else {
                // Test mode: 45 minute simulated countdown. Always reset when entering test mode.
                const endMins = now.getTime() + 45 * 60 * 1000;
                sessionStorage.setItem('testBreakEnd', endMins);
                breakEndTime = new Date(endMins);
                breakStartTime = new Date(breakEndTime.getTime() - 45 * 60 * 1000);
            }

            function tick() {
                const tickNow = new Date();
                
                const clockEl = document.getElementById('break-current-time');
                if (clockEl) {
                    clockEl.innerText = tickNow.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                }

                const remainingMs = breakEndTime.getTime() - tickNow.getTime();
                const timerEl = document.getElementById('break-countdown-timer');
                const progressBarEl = document.getElementById('break-progress-bar');

                if (remainingMs <= 0) {
                    if (timerEl) timerEl.innerText = "00:00";
                    if (progressBarEl) progressBarEl.style.width = "100%";
                    stopBreakOverlayTicker();
                    closeBreakPopup();
                    return;
                }

                const totalDurationMs = breakEndTime.getTime() - breakStartTime.getTime();
                const elapsedMs = tickNow.getTime() - breakStartTime.getTime();
                const progressPct = Math.min(100, Math.max(0, (elapsedMs / totalDurationMs) * 100));

                if (progressBarEl) {
                    progressBarEl.style.width = `${progressPct}%`;
                }

                const remainingSecs = Math.floor(remainingMs / 1000);
                const mins = Math.floor(remainingSecs / 60);
                const secs = remainingSecs % 60;
                const formattedTime = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;

                if (timerEl) {
                    timerEl.innerText = formattedTime;
                }
            }

            tick();
            clearInterval(breakIntervalId);
            breakIntervalId = setInterval(tick, 1000);
        }

        function stopBreakOverlayTicker() {
            if (breakIntervalId) {
                clearInterval(breakIntervalId);
                breakIntervalId = null;
            }
        }

        function showBreakPopup() {
            if (breakOverlay) {
                breakOverlay.style.display = 'flex';
                breakOverlay.offsetWidth; // Reflow
                breakOverlay.classList.add('active');
                
                // Focus modal control
                const firstBtn = document.getElementById('break-reload-btn');
                if (firstBtn) firstBtn.focus();
                trapFocus(breakOverlay);
            }
            startAnimation();
            startBreakOverlayTicker();
        }

        function isBreakActive() {
            const now = new Date();
            const day = now.getDay();
            if (day < 1 || day > 5) return false;

            const currentMins = now.getHours() * 60 + now.getMinutes();
            const startMins = 12 * 60 + 40; 
            const endMins = 13 * 60 + 25;   
            return currentMins >= startMins && currentMins < endMins;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const isTestMode = urlParams.has('test') && urlParams.get('test') === 'break';

        function checkAndOpenBreak() {
            updateBreakAlertBadge();
            const hasShownThisSession = sessionStorage.getItem('breakPopupShown') === 'true';
            
            if (isTestMode) {
                showBreakPopup();
            } else if (isBreakActive() && !hasShownThisSession) {
                showBreakPopup();
                sessionStorage.setItem('breakPopupShown', 'true');
            }
        }

        function updateBreakAlertBadge() {
            const container = document.getElementById('break-badge-container');
            if (!container) return;

            if (isBreakActive() || isTestMode) {
                if (!document.getElementById('trigger-break-btn')) {
                    const btn = document.createElement('button');
                    btn.id = 'trigger-break-btn';
                    btn.className = 'break-alert-indicator';
                    btn.innerHTML = '<span class="pulse"></span> System Break Active';
                    btn.addEventListener('click', () => {
                        showBreakPopup();
                    });
                    container.appendChild(btn);
                }
            } else {
                container.innerHTML = '';
            }
        }

        function closeBreakPopup() {
            if (breakOverlay) {
                breakOverlay.classList.remove('active');
                setTimeout(() => {
                    breakOverlay.style.display = 'none';
                    stopAnimation();
                    stopBreakOverlayTicker();
                }, 300); // 300ms transition time
            }
        }

        // Event Listeners
        window.addEventListener('resize', resizeCanvas);
        
        if (breakCanvas) {
            breakCanvas.addEventListener('click', (e) => {
                createTechBurst(e.clientX, e.clientY);
            });
            breakCanvas.addEventListener('touchstart', (e) => {
                if (e.touches && e.touches.length > 0) {
                    createTechBurst(e.touches[0].clientX, e.touches[0].clientY);
                }
            });
        }

        if (breakReloadBtn) {
            breakReloadBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                setRandomQuote();
                const rect = breakReloadBtn.getBoundingClientRect();
                createTechBurst(rect.left + rect.width / 2, rect.top + rect.height / 2);
            });
        }

        if (breakResumeBtn) {
            breakResumeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                closeBreakPopup();
            });
        }

        // Accessibility Modal Lock: Allow escape key closing for the break popup
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && breakOverlay && breakOverlay.classList.contains('active')) {
                closeBreakPopup();
            }
        });

        // Initialize Dynamic Pages on Load
        document.addEventListener('DOMContentLoaded', () => {
            renderTimetableGrid();
            renderMobileTimeline();
            setupDaySelector();
            highlightCurrent();
            checkAndOpenBreak();
            
            // Periodical loops
            setInterval(highlightCurrent, 60000);
            setInterval(checkAndOpenBreak, 60000);
        });
    </script>
    
    <!-- Load local offline-capable html2canvas library -->
    <script src="html2canvas.min.js"></script>
</body>
